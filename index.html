<!DOCTYPE html>
<html>
<head>
    <title>Đồng Hồ Trực Tuyến</title>
    <style>
        body {
            margin: 0;
            background: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* đẩy xuống dưới */
            padding-bottom: 20px; /* sát lề dưới (có thể chỉnh 0 nếu muốn sát hẳn) */
        }

        .container {
            display: flex;
            align-items: baseline;
            gap: 20px;
        }

        #clock {
            color: #000000;
            font-size: 90px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        #date {
            color: #000000;
            font-size: 28px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="clock"></div>
    <div id="date"></div>
</div>

<script>
function updateClock() {
    const now = new Date();

    const time = now.toLocaleTimeString('vi-VN');

    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const date = day + "/" + month;

    document.getElementById("clock").innerHTML = time;
    document.getElementById("date").innerHTML = date;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
